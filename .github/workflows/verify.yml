name: Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g markdownlint-cli
      - run: markdownlint "**/*.md" -c .markdownlint.json --ignore node_modules --ignore .git

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          folder-path: "."
          config-file: ".markdown-link-check.json"

  c-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc
      - run: find . -name "*.c" -not -path "*/node_modules/*" -not -path "*/.git/*" -exec gcc -fsyntax-only {} \;

  java-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - run: |
          mkdir -p /tmp/javac_out
          find . -name "*.java" -not -path "*/node_modules/*" -not -path "*/.git/*" -print0 | \
            xargs -0 javac -Xlint:none -proc:none -d /tmp/javac_out

  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: find . -name "*.py" -not -path "*/node_modules/*" -not -path "*/.git/*" -exec python -m py_compile {} \;

  javascript-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: find . -name "*.js" -not -path "*/node_modules/*" -not -path "*/.git/*" -exec node --check {} \;

  typescript-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g typescript
      - run: |
          find . -name "*.ts" -not -path "*/node_modules/*" -not -path "*/.git/*" -print0 | \
            xargs -0 -n 1 tsc --noEmit --pretty false --skipLibCheck

  sql-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip sqlfluff
      - run: |
          find . -name "*.sql" -not -path "*/node_modules/*" -not -path "*/.git/*" -print0 | \
            xargs -0 -r sqlfluff lint --dialect mysql
